name: ASSAY intraday gold levels

# Computes COMEX gold (GC=F) day-trade levels + NY-session probability from a free
# price feed every 15 min on weekdays and commits data/levels.json. All math, no API
# key needed. The homepage Sessions & Levels panel reads that file.

on:
  schedule:
    - cron: "*/15 * * * 1-5"   # every 15 min, Mon–Fri (UTC). GitHub schedules are best-effort and often run late.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: assay-levels
  cancel-in-progress: true

jobs:
  levels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Compute levels
        env:
          SYMBOL: "GC=F"
          OUTPUT_FILE: data/levels.json
          REFRESH_MIN: "15"
          BAR_MIN: "15"
        run: node levels.mjs        # no dependencies, no API key

      - name: Commit levels
        run: |
          git config user.name  "assay-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/levels.json
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "chore: update intraday levels [skip ci]"
            git push
          fi
