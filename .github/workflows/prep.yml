name: Morning prep gold brief

# Builds the pre-market "Morning Prep" gold brief (risk tone, overnight recap,
# sector drivers, today's key events, top-3 headlines) via the free Gemini API
# and commits data/prep.json. The homepage Morning Prep panel reads that file.
# Needs repo secret GEMINI_API_KEY (from aistudio.google.com/apikey).

on:
  schedule:
    # Mornings (US/Eastern), Mon–Fri. Cron is UTC. Times below assume EDT (summer, UTC-4):
    # 11:45 / 13:45 / 15:45 UTC = 7:45am / 9:45am / 11:45am ET. First run = 7:45am.
    # NOTE: in winter (EST, UTC-5) these shift one hour earlier (6:45/8:45/10:45am ET).
    # To keep 7:45am ET in winter, change "45 11,13,15" to "45 12,14,16".
    - cron: "45 11,13,15 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: morning-prep
  cancel-in-progress: true

jobs:
  prep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build morning prep brief
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OUTPUT_FILE: data/prep.json
        run: node prep.mjs

      - name: Commit prep brief
        run: |
          git config user.name  "prep-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/prep.json
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "chore: update morning prep brief [skip ci]"
            git push
          fi
